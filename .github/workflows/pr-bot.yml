name: PR steward

on:
  schedule:
    - cron: "0 8 * * 6"
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-bot-${{ github.event.pull_request.number || 'scheduled' }}
  cancel-in-progress: true

jobs:
  review:
    # Review all PRs (including test-bot); duplicate comments are skipped via <!-- pr-bot:steward -->
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: python -m pip install -e ./scripts/pr-bot

      - name: Post steward comment on PR
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            pr-bot --pr "${{ github.event.pull_request.number }}"
          else
            pr-bot
          fi
