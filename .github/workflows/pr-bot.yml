name: PR steward

on:
  schedule:
    - cron: "0 8 * * 6"
  workflow_dispatch:
  # After PR Check — runs with repo secrets without maintainer approval (unlike pull_request).
  workflow_run:
    workflows: [PR Check]
    types: [completed]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-bot-${{ github.event.workflow_run.pull_requests[0].number || github.run_id }}
  cancel-in-progress: true

jobs:
  review:
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.event == 'pull_request' &&
       github.event.workflow_run.conclusion != 'cancelled')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # Always run pr-bot from default branch — PR head may lack infra fixes.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: python -m pip install -e ./scripts/pr-bot

      - name: Post steward comment on PR
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            PR="${{ github.event.workflow_run.pull_requests[0].number }}"
            if [ -z "$PR" ]; then
              echo "No PR linked to workflow_run; skipping."
              exit 0
            fi
            pr-bot --pr "$PR"
          else
            pr-bot
          fi
