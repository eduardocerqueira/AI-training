# Approve workflow runs blocked on "awaiting maintainer" (fork PRs, Copilot, first-time contributors).
# Uses pull_request_target (base branch only — does not execute PR code).
name: Auto-approve pending workflows

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  actions: write

jobs:
  approve:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Approve workflow runs awaiting maintainer
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.payload.pull_request.head.sha;
            const { owner, repo } = context.repo;
            let page = 1;
            let approved = 0;

            while (true) {
              const { data } = await github.rest.actions.listWorkflowRunsForRepo({
                owner,
                repo,
                head_sha: sha,
                per_page: 100,
                page,
              });

              for (const run of data.workflow_runs) {
                if (run.conclusion !== "action_required") continue;
                try {
                  await github.rest.actions.approveWorkflowRun({
                    owner,
                    repo,
                    run_id: run.id,
                  });
                  approved += 1;
                  core.info(`Approved run ${run.id} (${run.name})`);
                } catch (error) {
                  core.info(`Could not approve run ${run.id}: ${error.message}`);
                }
              }

              if (data.workflow_runs.length < 100) break;
              page += 1;
            }

            core.info(`Approved ${approved} workflow run(s) for ${sha}`);
