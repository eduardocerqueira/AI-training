name: Issue bot

on:
  schedule:
    - cron: "0 8 * * 5"
  workflow_dispatch:
    inputs:
      plan_only:
        description: Post plan only (no implementation PR)
        type: boolean
        default: false
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: issue-bot-${{ github.event.issue.number || github.run_id }}
  cancel-in-progress: false

jobs:
  triage:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'issues' && github.event.label.name == 'agent')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: python -m pip install -e ./scripts/issue-bot

      - name: Plan and implement agent issue
        id: issue-bot
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ISSUE_BOT_BASE_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::error::OPENAI_API_KEY repository secret is required."
            exit 1
          fi
          FLAGS=""
          if [ "${{ inputs.plan_only }}" = "true" ]; then
            FLAGS="--plan-only"
          fi
          issue-bot $FLAGS

      - name: Create pull request
        if: ${{ steps.issue-bot.outputs.branch != '' }}
        env:
          GH_TOKEN: ${{ secrets.ISSUE_BOT_GH_TOKEN || secrets.GITHUB_TOKEN }}
          PR_BODY: ${{ steps.issue-bot.outputs.pr_body }}
          PR_TITLE: ${{ steps.issue-bot.outputs.pr_title }}
        run: |
          set -euo pipefail
          body_file="${RUNNER_TEMP}/issue-bot-pr-body.md"
          printf '%s\n' "$PR_BODY" > "$body_file"
          if gh pr create \
            --title "$PR_TITLE" \
            --body-file "$body_file" \
            --head "${{ steps.issue-bot.outputs.branch }}" \
            --base "${{ github.event.repository.default_branch }}"; then
            echo "Opened pull request for branch ${{ steps.issue-bot.outputs.branch }}"
          else
            echo "::error::Could not create pull request. Enable Actions PR creation or set ISSUE_BOT_GH_TOKEN."
            echo "Branch was pushed: ${{ steps.issue-bot.outputs.branch }}"
            exit 1
          fi
