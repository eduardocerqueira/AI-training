# Docs-guided learning: proposal issue → doc or Python scaffold → PR.
name: Experiment agent

on:
  schedule:
    # Every other day at 08:00 UTC (days 1, 3, 5, …)
    - cron: "0 8 1-31/2 * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: Plan only (no issue, commit, or PR)
        type: boolean
        default: false

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: experiment-agent-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  experiment:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install experiment agent
        run: python -m pip install -e ./scripts/experiment-agent

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run experiment agent
        id: agent
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          EXPERIMENT_AGENT_BASE_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::error::OPENAI_API_KEY repository secret is required."
            exit 1
          fi
          experiment-agent ${{ inputs.dry_run && '--dry-run' || '' }}

      - name: Create pull request
        if: ${{ !inputs.dry_run && steps.agent.outputs.branch != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_BODY: ${{ steps.agent.outputs.pr_body }}
          PR_TITLE: ${{ steps.agent.outputs.pr_title }}
        run: |
          set -euo pipefail
          body_file="${RUNNER_TEMP}/experiment-agent-pr-body.md"
          printf '%s\n' "$PR_BODY" > "$body_file"
          gh pr create \
            --title "$PR_TITLE" \
            --body-file "$body_file" \
            --head "${{ steps.agent.outputs.branch }}" \
            --base "${{ github.event.repository.default_branch }}"
