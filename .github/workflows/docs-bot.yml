name: Docs bot

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:
    inputs:
      dry_run:
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: docs-bot
  cancel-in-progress: false

jobs:
  docs:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      BOT_GH_TOKEN: ${{ secrets.BOT_GH_TOKEN || secrets.ISSUE_BOT_GH_TOKEN || secrets.TEST_BOT_GH_TOKEN || secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: python -m pip install -e ./scripts/docs-bot

      - name: Sync apps catalog
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ env.BOT_GH_TOKEN }}
          DOCS_BOT_BASE_BRANCH: ${{ github.event.repository.default_branch }}
        run: docs-bot ${{ inputs.dry_run && '--dry-run' || '' }}
